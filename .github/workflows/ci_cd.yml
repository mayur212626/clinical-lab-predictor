name: CI/CD — Clinical Lab Predictor

# Runs on every push to main or a PR targeting main.
# Three stages: test → train+evaluate → deploy (main only).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Lint and test ──────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest flake8

      - name: Lint (flake8)
        # E501 = line too long, W503 = line break before binary op — both fine to ignore
        run: flake8 src/ api/ tests/ --max-line-length=110 --ignore=E501,W503

      - name: Run unit tests
        run: pytest tests/ -v --tb=short


  # ── Stage 2: Train, evaluate, check governance ─────────────────────────────
  train:
    name: Train & Evaluate
    runs-on: ubuntu-latest
    needs: test   # only runs if tests pass

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Data curation
        run: python src/data_curation.py

      - name: Feature engineering
        run: python src/feature_engineering.py

      - name: Train Random Forest
        run: python src/train_rf.py

      - name: Train deep learning model
        run: python src/train_dl.py

      - name: Evaluate + fairness audit
        run: python src/evaluate.py

      - name: Governance (versioning + model card)
        run: python src/governance.py

      - name: Check governance status
        # Fail the pipeline if the model didn't pass the AUC threshold
        run: |
          python - <<'EOF'
          import json, sys
          report = json.load(open("docs/eval_report.json"))
          status = report.get("governance_status", "UNKNOWN")
          auc    = report.get("overall_metrics", {}).get("auc_roc", 0)
          print(f"Status: {status}  |  AUC-ROC: {auc}")
          if status != "APPROVED":
              print("Model did not meet the governance threshold — failing pipeline")
              sys.exit(1)
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v3
        with:
          name: trained-models
          path: |
            models/
            docs/
          retention-days: 30


  # ── Stage 3: Deploy (main branch only) ─────────────────────────────────────
  deploy:
    name: Deploy to SageMaker
    runs-on: ubuntu-latest
    needs: train
    # Only deploy on pushes to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt boto3 sagemaker

      - name: Download model artifacts
        uses: actions/download-artifact@v3
        with:
          name: trained-models

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Deploy to SageMaker
        run: python src/deploy_sagemaker.py

      - name: Print deployment summary
        run: |
          echo "Deployed at $(date -u)"
          cat docs/audit_log.json | python -m json.tool | tail -20
